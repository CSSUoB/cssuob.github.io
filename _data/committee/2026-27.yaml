    start-date: 1/7/2026
    bio: >
      Hello! I'm Harry, a second-year Computer Science student, and I'm delighted to be your Industrial Liaison. My main focus is to secure sponsorships for the society, so we can fund lots of great events this year. I'll also be organising a range of events in collaboration with industry, so you can discover interesting opportunities, build connections and hone your skills.
