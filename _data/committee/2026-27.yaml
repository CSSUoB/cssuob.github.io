    picture: /assets/committee/2026-27/mini/jacob.jpg
    start-date: 1/7/2026
    bio: >
      Hey all! I'm Jacob, a first year PhD student in the security and privacy group, and I'm your PGR Rep for this coming year! My main responsibilities are to represent the interests of the PGR community here in computer science, work to make socials that suit PGRs, encourage attendance to events, and represent CSS at the SRSCC. Outside of work, I enjoy gaming (mainly Overwatch), ethical hacking, football, and music. Whether you're a PGR or not, feel free to drop me a message on Discord or catch me around the CS building :)

  - name: Maddy Lardner
    discordtag: darkbanshee
