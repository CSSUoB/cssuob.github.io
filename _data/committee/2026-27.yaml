    picture: /assets/committee/2026-27/mini/maddy.jpg
    start-date: 1/7/2026
    bio: >
      Hi! I'm Maddy, a PGT student studying AI and Machine Learning, and I'm excited to be your new PGT Rep this year. As someone new to UOB, I've jumped straight into getting involved and connecting with our community. Outside of studying, I'm a massive gamer and a pretty terrible netball player. My goal is to represent and support all PGT students, making sure everyone feels welcome, included, and heard.
      If you ever need anything or just fancy a chat, feel free to reach out but be warned I can talk for ages :)

  - name: Day Jones
    discordtag: drjcastle10
    pronouns: They/Them
    role: Hackathons Officer
    picture: /assets/committee/2026-27/mini/day1
    start-date: 1/7/2026
    bio: >
      Good Tidings everyone, I'm Day a third year M.Sci Mathematics and Computer Science student, and will be the Hackathons Officer for this academic year. I will be mainly focused on making sure BirmingHack 3.0 is planned and executed well, but we might also have time in the schedule to run a few smaller hackathons in the runup to BirmingHack. My main pastimes are: reading, video/board games, ethical hacking, music, and maintaining my homelab and other projects at drjoness.uk. If you have any queries about BirmingHack or suggestions to be made, drop me a message on Discord or feel free to say hello in person.
